<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Holberton - Web Stack - Bootstrap</title>
	<meta name="description" content="Bootstrap is a free and open-source CSS framework">

	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
		integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>

<body>
	<div class="row">
		<div class="col-lg bg-primary text-white text-center p-2">Primary</div>
		<div class="col-lg bg-success text-white text-center p-2">Success</div>
		<div class="col-lg bg-danger text-white text-center p-2">Danger</div>
		<div class="col-lg bg-warning text-white text-center p-2">Warning</div>
	</div>

	<hr />

	<div class="row">
		<div class="bg-primary text-white text-center p-2 col-sm">Primary</div>
		<div class="bg-success text-white text-center p-2 col-sm">Success</div>
		<div class="bg-danger text-white text-center p-2 col-sm">Danger</div>
		<div class="bg-warning text-white text-center p-2 col-sm">Warning</div>
	</div>

	<hr />

	<div class="row">
		<div class="col-12 col-lg-2 bg-primary text-white text-center p-2">Primary</div>
		<div class="col-12 col-lg-4 bg-success text-white text-center p-2">Success</div>
		<div class="col-12 col-lg-6 bg-danger text-white text-center p-2">Danger</div>
	</div>

	<hr />
	<div class="row">
		<div class="col-6 col-md-3 bg-primary text-white text-center p-2 order-4 order-md-3 order-lg-2 order-xl-1">
			Primary</div>
		<div class="col-6 col-md-3 bg-success text-white text-center p-2 order-1 order-md-4 order-lg-3 order-xl-2">
			Success
		</div>
		<div class="col-6 col-md-3 bg-danger text-white text-center p-2 order-3 order-md-1 order-lg-4 order-xl-3">
			Danger
		</div>
		<div class="col-6 col-md-3 bg-warning text-white text-center p-2 order-2 order-md-2 order-lg-1 order-xl-4">
			Warning
		</div>
	</div>


	<hr />

	<div class="row justify-content-between">
		<!-- Primary cell -->
		<div class="col-6 col-md-2 bg-primary text-white text-center p-2 mb-2">Primary</div>
		<div class="col-6 col-md-2 bg-warning text-white text-center p-2 mb-2">Warning</div>
	</div>

	<hr />

	<div class="row justify-content-between">
		<!-- First cell -->
		<div class="col-12 col-md-2 bg-primary text-white text-center p-2 mb-2 mb-md-0">Primary</div>

		<!-- Middle cell -->
		<div class="col-12 col-md-2 bg-success text-white text-center p-2 mb-2 mb-md-0"">Middle</div>

		<!-- Last cell -->
		<div class=" col-12 col-md-2 bg-danger text-white text-center p-2">Last</div>
	</div>

</body>

</html>
